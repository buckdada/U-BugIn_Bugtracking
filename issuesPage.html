<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues page </title>
    <link rel="stylesheet" href="Style sheet.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4"> 

<!-- Top bar section  -->
 <div class="d-flex justify-content-between mb-3">
    <button class="btn btn-secondary" onclick="goBack()"> ⬅️Back</button>
    <button class="btn btn-primary" onclick="showForm()"> + Add Issue</button>
</div>

<h2>Issue ticket tracker</h2>

<!-- Search and filter section   -->
  <div class="row mb-3">
    <div class="col">
        <label ><b>Search</b></label>
        <input type="text" id="search" class="form-control" placeholder="Search issues...">
    </div>
    <div class="col">
        <label ><b>Filter</b></label>
        <select id="filterStatus" class="form-control">
            <option value="">select status option </option>
            <option>Open</option>
            <option>Resolved</option>
            <option>Overdue</option>
        </select>
    </div>
  </div>

<!-- Form section-->
<div id="formContainer" class="card p-3 mb-3 d-none">
<form id="issueForm">

<input type="hidden" id="issueId">

<div class="row">
    <div class="col">
        <label><b>Summary</b></label>
        <input type="text" id="summary" placeholder="e.g Login button is not working" class="form-control"  required>
    </div>

    <div class="col">
        <label><b>Project</b></label>
        <select id="project" class="form-control"></select>
    </div>
</div>

<label class="mt-2"><b>Description</b></label>
<textarea id="description" placeholder="Describe the issue in detail, What happened and when?" class="form-control"></textarea>

<div class="row mt-2">
    <div class="col">
        <label><b>Status</b></label>
        <select id="status" class="form-control">
            <option>Open</option>
            <option>Resolved</option>
            <option>Overdue</option>
        </select>
    </div>

    <div class="col">
        <label> <b>Priority</b></label>
        <select id="priority" class="form-control">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>
    </div>
</div>

<div class="row mt-2">
    <div class="col">
        <label><b>Assigned To</b></label>
        <select id="assigned" class="form-control"></select>
    </div>

    <div class="col">
        <label><b>Date created</b></label>
        <input type="date" id="dateCreated" class="form-control" required>
    </div>

    <div class="col">
        <label><b>Target date </b></label>
        <input type="date" id="targetDate" class="form-control" required>
    </div>
</div>

<div class="row mt-2">
    <div class="col">
        <label><b>Resolution Date</b></label>
        <input type="date" id="resolutionDate" class="form-control">
    </div>

    <div class="col">
        <label><b>Resolution Summary</b></label>
        <input type="text" id="resolutionSummary" placeholder="summary of how the issue solved " class="form-control">
    </div>
</div>

<button class="btn btn-success mt-3">Save</button>
<button type="button" class="btn btn-danger mt-3" onclick="hideForm()">Cancel</button>

</form>
</div>

<!--issues results table  -->
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
    
    <th>Summary </th>
    <th>Status</th>
    <th>Priority</th>
    <th>Assigned to</th>
    <th>Project type </th>
    <th>Actions</th>
</tr>
</thead>
<tbody id="issueTable"></tbody>
</table>

<!-- Issues modal  -->
<div class="modal fade" id="viewModal">
<div class="modal-dialog">
<div class="modal-content p-3">
<h4>Issue Details</h4>
<div id="modalContent"></div>
<button class="btn btn-secondary mt-2" data-bs-dismiss="modal">Close</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="issuesPage.js"></script>

</body>
</html>
